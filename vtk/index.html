    //测距
    let pointCount = 0;

    function euclideanDistance(point1, point2) {
    // 将坐标字符串转换为坐标数组
    const coordinates1 = point1.split(',').map(Number);
    const coordinates2 = point2.split(',').map(Number);
    console.log(coordinates1);
    // 计算两个点的欧氏距离
    // 提取坐标值
    const [x1, y1, z1] = coordinates1;
    const [x2, y2, z2] = coordinates2;

    // 计算欧几里得距离
    const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2) + Math.pow(z2 - z1, 2));

    return distance;
}
