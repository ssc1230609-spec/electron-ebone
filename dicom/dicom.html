<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="../assets/css/dicom.css">
  <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script>
  <script src="https://unpkg.com/cornerstone-tools@6.0.8/dist/cornerstoneTools.js"></script>
  <script src="https://unpkg.com/cornerstone-wado-image-loader@4.1.5/dist/cornerstoneWADOImageLoader.bundle.min.js"></script>
  <script src="https://unpkg.com/dicom-parser@1.8.13/dist/dicomParser.js"></script>
  <script src="https://unpkg.com/cornerstone-math@0.1.10/dist/cornerstoneMath.min.js"></script>
</head>
<body>
  <div class="title-bar">
    DICOMVIEWER
  </div>
  <div id="rectangle">
    <a href="../../shouye.html"><img  src="../assets/images/fanhui.png" alt="返回"></a>
    <!-- 添加label标签，优化input标签样式 -->
    <label for="fileInput">
      <img id="icon" src="../assets/images/wenjianjia.png" alt="Icon 1">
    </label>
    <input type="file" id="fileInput" onchange="processFiles()" webkitdirectory directory multiple>
    <img id="icon2" src="../assets/images/tuxiang-fangda-01.png" onclick="FangDa()" alt="Icon 2">
    <img id="icon3" src="../assets/images/tuxiang-suoxiao-01.png" alt="Icon 3">
    <img src="../assets/images/tuxiangpingyi.png" alt="Icon 4">
    <img src="../assets/images/tuxiangfuwei.png" alt="Icon 5">
    <img src="../assets/images/img_5.png" onclick="Length()" alt="Icon 6">
    <!-- <img src="../assets/images/img_6.png" alt="Icon 7">
    <img src="../assets/images/img_7.png" alt="Icon 8"> -->
  </div>
  <div id="bottomRectangle">
    <div id="enabledElement" >
      <input type="range" id="imageSlider1"  value="0">
      </div> 
    </div>
  </div>
</body>
<script>
   // cornerstone初始化
   cornerstoneTools.init({
      touchEnabled: false,
      showSVGCursors: false
    }); 
    cornerstoneTools.external.cornerstone = cornerstone;
    cornerstoneTools.external.cornerstoneMath = cornerstoneMath;

    cornerstoneWADOImageLoader.webWorkerManager.initialize({
      maxWebWorkers: navigator.hardwareConcurrency || 1,
      startWebWorkersOnDemand: true,
      taskConfiguration: {
        decodeTask: {
          initializeCodecsOnStartup: false
        }
      },
      webWorkerTaskPaths: [
        "https://unpkg.com/cornerstone-wado-image-loader@4.1.5/dist/610.bundle.min.worker.js",
      ]
    });
    cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
    cornerstoneWADOImageLoader.external.dicomParser = dicomParser;
    const element = document.getElementById("enabledElement");
    cornerstone.enable(element);
    const PanTool = cornerstoneTools.PanTool;
    const MagnifyTool = cornerstoneTools.MagnifyTool;
    const lengthTool = cornerstoneTools.LengthTool;
    const Eraser = cornerstoneTools.EraserTool;
    const StackScrollMouseWheelTool = cornerstoneTools.StackScrollMouseWheelTool;
    let imageIds = [];
    //隐藏控制条
    window.onload = function() {
      document.getElementById("imageSlider1").style.display = "none";
    }
    function processFiles() {
      clearLoadedImages()
      const fileInput = document.getElementById('fileInput');
      fileInput.addEventListener('click', function(e){
        enabledElement.style.display = "block";
        enabledElements.style.display = "none";
        enabledElement2.style.display = "none";
        imageSlider.style.display = "none";
      });
      const files = fileInput.files;

    
      const dcmFiles = [];
      for (let i = 0; i < files.length; i++) {
          const file = files[i];
          if (file.type === 'application/dicom' || file.name.endsWith('.dcm')) {
              dcmFiles.push(file);
          }
      }
      console.log(dcmFiles);
      for (let i = 0; i < dcmFiles.length; i++){
          const file = dcmFiles[i];
          const imageId = cornerstoneWADOImageLoader.wadouri.fileManager.add(file);
          // console.log(imageId);
          // 添加到imageIds数组中
          imageIds.push(imageId);
          loadAndDisplayImage(imageIds)
      }
      StackScrollMouseWheel()
      console.log(imageIds.length);
      var slider1 = document.getElementById('imageSlider1');
      slider1.value = currentIndex;
      slider1.min = 0;
      slider1.max = imageIds.length - 1;
      //onchange事件触发后显示控制条
      document.getElementById('imageSlider1').style.display = 'block';
    }
    //放入堆栈
    function loadAndDisplayImage(imageIds) {
      const stack = {
        currentImageIdIndex: 0,
        imageIds: imageIds
      };
      
    cornerstone.loadImage(imageIds[0]).then((image) => {
      cornerstone.displayImage(element, image);
      cornerstoneTools.addStackStateManager(element, ['stack']);
      cornerstoneTools.addToolState(element, 'stack', stack);
    
      
    });
   }
   //滚轮控制＋右键平移+左键放大
   function StackScrollMouseWheel(){
    cornerstoneTools.addTool(StackScrollMouseWheelTool, {
        configuration: {
          loop: true,
          allowSkipping: true,
          invert: false
        },
      });
    cornerstoneTools.addTool(PanTool);
    cornerstoneTools.addTool(MagnifyTool);
    cornerstoneTools.setToolActive('Magnify', { mouseButtonMask: 1});
    cornerstoneTools.setToolActive('Pan', { mouseButtonMask: 2 });
    cornerstoneTools.setToolActive("StackScrollMouseWheel", { mouseButtonMask: 4 });
   }
   
   function Length(){
    
    cornerstoneTools.addTool(lengthTool);
    cornerstoneTools.addTool(Eraser);
    cornerstoneTools.setToolDisabled('Magnify', { mouseButtonMask: 1});
    cornerstoneTools.setToolDisabled('Pan', { mouseButtonMask: 2 });
    cornerstoneTools.setToolActive('Eraser', { mouseButtonMask: 2});
    cornerstoneTools.setToolActive('Length', { mouseButtonMask: 1 });
   }
   function FangDa(){
   
      cornerstoneTools.setToolDisabled('Length', { mouseButtonMask: 1 });
      cornerstoneTools.setToolActive('Magnify', { mouseButtonMask: 1});
      cornerstoneTools.setToolActive('Pan', { mouseButtonMask: 2 });
      cornerstoneTools.setToolDisabled('Eraser', { mouseButtonMask: 2});
      
   }
   
  
   //导入scroll和scrollToIndex工具
   const scroll = cornerstoneTools.importInternal("util/scroll");
   const scrollToIndex = cornerstoneTools.importInternal("util/scrollToIndex");
   // 监听鼠标滚轮事件
   var currentIndex = 0;
   scrollToIndex(element, currentIndex);
  document.addEventListener('wheel', function(event) {
    if(event.target.tagName.toLowerCase() === 'canvas'){
      event.preventDefault();
      
      var delta = Math.sign(event.deltaY);
      var newIndex = currentIndex + delta;
      
      // 边界值处理
      if (newIndex < 0) {
          newIndex = 0;
      } else if (newIndex >= imageIds.length) {
          newIndex = imageIds.length - 1;
      }
      currentIndex = newIndex;
      var slider1 = document.getElementById('imageSlider1');
      slider1.value = currentIndex;
      // 显示新的图片
      scrollToIndex(element, newIndex);}
     
  }, { passive: false });
 
  // 监听控制条变化
  document.getElementById('imageSlider1').addEventListener('input', function(event) {
      var newIndex = parseInt(event.target.value);
      currentIndex = newIndex;
      scrollToIndex(element, newIndex);
  });
  function clearLoadedImages() {
    // 清除影像
    cornerstone.imageCache.purgeCache();
    // 重置 imageIds 数组
    imageIds = [];
    // 重置 currentIndex
    currentIndex = 0;
    // 清除控制条
    var slider1 = document.getElementById('imageSlider1');
    slider1.value = 0;
    slider1.min = 0;
    slider1.max = 0;
    // 隐藏控制条
    slider1.style.display = 'none';
}


</script>
</html>
